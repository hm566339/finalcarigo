spring:
  application:
    name: userms

  datasource:
    url: jdbc:mysql://localhost:3306/hms_userdb
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         public-key-location: classpath:keys/public.pem

# Custom messages
USER_ALREADY_EXISTS: User with the given email already exists.
USER_NOT_FOUND: User with the given ID not found.
INVALID_CREDENTIALS: Invalid email or password.

server:
  port: 8080
