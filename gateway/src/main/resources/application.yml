spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:

        # ---------------- USER SERVICE ----------------
        - id: userms
          uri: http://localhost:8080
          predicates:
            - Path=/user/**
          filters:
            - TokenFilter

        # ---------------- CAR OWNER ----------------
        - id: carowner
          uri: http://localhost:8081
          predicates:
            - Path=/car-owners/**
          filters:
            - TokenFilter

        # ---------------- RENTER ----------------
        - id: renter
          uri: http://localhost:8081
          predicates:
            - Path=/renters/**
          filters:
            - TokenFilter

        # ---------------- KYC ----------------
        - id: kyc
          uri: http://localhost:8081
          predicates:
            - Path=/kyc/**
          filters:
            - TokenFilter
        # ---------------- VEHICLES ----------------
        - id: vehicles
          uri: http://localhost:8083
          predicates:
            - Path=/vehicles/** 
          filters:
            - TokenFilter

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_UNIQUE

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true

server:
  port: 9000
